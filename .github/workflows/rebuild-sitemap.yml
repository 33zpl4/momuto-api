name: Rebuild Sitemap

on:
  schedule:
    # Runs daily at 04:00 UTC — picks up any new blog posts published the day before
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print sitemap, do not push to CMS)'
        type: boolean
        default: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild and push sitemap
        env:
          OEMSAAS_TOKEN_EN: ${{ secrets.OEMSAAS_TOKEN_EN }}
          OEMSAAS_TOKEN_ES: ${{ secrets.OEMSAAS_TOKEN_ES }}
          OEMSAAS_TOKEN_FR: ${{ secrets.OEMSAAS_TOKEN_FR }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node scripts/rebuild-sitemap.js --dry-run
          else
            node scripts/rebuild-sitemap.js
          fi
